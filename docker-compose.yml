services:

  postgres:
    image: postgres:17
    container_name: corely-postgres

    environment:
      POSTGRES_DB: corely
      POSTGRES_USER: corely
      POSTGRES_PASSWORD: corely

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: corely-pgadmin

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@corely.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

    depends_on:
      - postgres

    restart: unless-stopped

volumes:
  postgres_data:
