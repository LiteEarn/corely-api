spring:
  application:
    name: corely-api
  datasource:
    url: jdbc:postgresql://localhost:5432/corely
    username: corely
    password: corely
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  secret: my-secret-key-for-corely-application-2024
  access-token-expiration: 900000
  refresh-token-expiration: 604800000
