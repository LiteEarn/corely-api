spring.application.name=corely-api
spring.datasource.url=jdbc:postgresql://localhost:5432/corely_test
spring.datasource.username=corely
spring.datasource.password=corely
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
jwt.secret=my-secret-key-for-corely-application-2024
jwt.expiration=86400000
